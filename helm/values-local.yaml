# ────────────────────────────────────────────────────────────────
# 로컬 맥북 환경 (Orbstack K8s)
# 사용법: helm upgrade --install is-bot ./helm -f helm/values-local.yaml
# ────────────────────────────────────────────────────────────────

ollama:
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  persistence:
    size: 20Gi
    storageClass: "local-path"    # Orbstack 기본값

qdrant:
  persistence:
    size: 5Gi
    storageClass: "local-path"

openWebui:
  serviceType: NodePort
  nodePort: 30300             # http://localhost:30300 으로 접근
  persistence:
    storageClass: "local-path"

langchainApi:
  extraEnv:
    OLLAMA_URL: "http://192.168.139.3:11434"

ingress:
  enabled: false
