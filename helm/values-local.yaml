# ────────────────────────────────────────────────────────────────
# 로컬 맥북 환경 (Orbstack K8s)
# 사용법: helm upgrade --install is-bot ./helm -f helm/values-local.yaml
# ────────────────────────────────────────────────────────────────

ollama:
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  persistence:
    size: 20Gi
    storageClass: "local-path"    # Orbstack 기본값

qdrant:
  persistence:
    size: 5Gi
    storageClass: "local-path"

langchainApi:
  image: is-bot-api:latest
  imagePullPolicy: Never
  extraEnv:
    OLLAMA_URL: "http://host.internal:11434"

postgresql:
  persistence:
    size: 5Gi
    storageClass: "local-path"

web:
  image: is-bot-web:latest
  imagePullPolicy: Never
  replicas: 1
  serviceType: NodePort
  nodePort: 30300

ingress:
  enabled: false
