namespace: is-bot

# ── Ollama (LLM 추론 서버) ────────────────────────────────────────
ollama:
  image: ollama/ollama:latest
  model: gemma3:4b          # 기본 LLM 모델
  embedModel: nomic-embed-text  # 임베딩 모델
  port: 11434
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  persistence:
    size: 20Gi
    storageClass: ""          # 빈 값 = 클러스터 기본 StorageClass 사용
  gpu:
    enabled: false
    nodeSelector: {}          # 예: { accelerator: nvidia }

# ── Qdrant (Vector DB) ────────────────────────────────────────────
qdrant:
  image: qdrant/qdrant:v1.13.2
  port: 6333
  grpcPort: 6334
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  persistence:
    size: 10Gi
    storageClass: ""

# ── LangChain RAG API (FastAPI 백엔드) ───────────────────────────
langchainApi:
  image: your-registry/is-bot-api:latest
  port: 8080
  replicas: 1
  staticNodePort: 31001
  embedDim: 768             # nomic-embed-text 기준
  collectionName: security_docs
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ── PostgreSQL (대화 기록 DB) ─────────────────────────────────────
postgresql:
  persistence:
    size: 5Gi
    storageClass: ""          # 빈 값 = 클러스터 기본 StorageClass 사용

# ── IS Bot Web (Next.js 프론트엔드) ───────────────────────────────
web:
  image: your-registry/is-bot-web:latest
  replicas: 1
  nextauthUrl: "http://is-bot.internal"
  serviceType: ClusterIP
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── Ingress ───────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  host: is-bot.internal
  tls: false
  annotations: {}
