apiVersion: apps/v1
kind: Deployment
metadata:
  name: langchain-api
  namespace: {{ .Values.namespace }}
  labels:
    app: langchain-api
    {{- include "is-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.langchainApi.replicas }}
  selector:
    matchLabels:
      app: langchain-api
  template:
    metadata:
      labels:
        app: langchain-api
    spec:
      containers:
        - name: langchain-api
          image: {{ .Values.langchainApi.image }}
          ports:
            - containerPort: {{ .Values.langchainApi.port }}
          envFrom:
            - configMapRef:
                name: langchain-api-config
          resources:
            {{- toYaml .Values.langchainApi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.langchainApi.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.langchainApi.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: langchain-api
  namespace: {{ .Values.namespace }}
  labels:
    app: langchain-api
    {{- include "is-bot.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.langchainApi.port }}
      targetPort: {{ .Values.langchainApi.port }}
      name: http
  selector:
    app: langchain-api
