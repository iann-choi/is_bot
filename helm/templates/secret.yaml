# ────────────────────────────────────────────────────────────────────────────
# Secrets are NOT managed by Helm to avoid storing sensitive values in git.
# Create them manually before deploying:
#
# 1. PostgreSQL Secret:
#    kubectl create secret generic postgresql-secret \
#      --from-literal=password=CHANGE_ME \
#      --from-literal=database-url="postgresql://isbot:CHANGE_ME@postgresql:5432/isbot" \
#      -n is-bot
#
# 2. Web Application Secret:
#    kubectl create secret generic web-secret \
#      --from-literal=nextauth-secret=$(openssl rand -base64 32) \
#      --from-literal=google-client-id=CHANGE_ME \
#      --from-literal=google-client-secret=CHANGE_ME \
#      -n is-bot
#
# To generate a secure NEXTAUTH_SECRET locally:
#   openssl rand -base64 32
#
# Google OAuth credentials:
#   https://console.cloud.google.com/apis/credentials
#   Authorized redirect URI: https://YOUR_DOMAIN/api/auth/callback/google
# ────────────────────────────────────────────────────────────────────────────
