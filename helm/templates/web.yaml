apiVersion: apps/v1
kind: Deployment
metadata:
  name: is-bot-web
  namespace: {{ .Values.namespace }}
  labels:
    app: is-bot-web
    {{- include "is-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas | default 1 }}
  selector:
    matchLabels:
      app: is-bot-web
  template:
    metadata:
      labels:
        app: is-bot-web
    spec:
      containers:
        - name: is-bot-web
          image: {{ .Values.web.image }}
          imagePullPolicy: {{ .Values.web.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: database-url
            - name: RAG_API_URL
              value: http://langchain-api:8080
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: is-bot-web
  namespace: {{ .Values.namespace }}
  labels:
    app: is-bot-web
    {{- include "is-bot.labels" . | nindent 4 }}
spec:
  selector:
    app: is-bot-web
  ports:
    - port: 3000
      targetPort: 3000
      {{- if .Values.web.nodePort }}
      nodePort: {{ .Values.web.nodePort }}
      {{- end }}
  type: {{ .Values.web.serviceType | default "ClusterIP" }}
